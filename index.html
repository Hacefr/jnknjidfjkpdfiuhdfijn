<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eaglercraft 1.12.2 Downloads</title>
    <style>
        /* GitHub Dark Mode Theme */
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background-color: #161b22;
            padding: 40px;
            border-radius: 6px;
            border: 1px solid #30363d;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #f0f6fc;
        }

        p {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* GitHub Primary Green Button (Tuff Client) */
        .btn-primary {
            display: inline-block;
            background-color: #238636;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            transition: background-color 0.2s;
            border: 1px solid rgba(240, 246, 252, 0.1);
        }

        .btn-primary:hover {
            background-color: #2ea043;
        }

        /* GitHub Secondary Gray Button (Normal WASM) */
        .btn-secondary {
            display: inline-block;
            background-color: #21262d;
            color: #c9d1d9;
            text-decoration: none;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            transition: background-color 0.2s;
            border: 1px solid #30363d;
        }

        .btn-secondary:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Eaglercraft 1.12.2</h1>
        <p>Select a version to download or play.</p>
        
        <div class="button-group">
            <!-- Tuff Client Option -->
            <a href="" class="btn-primary" download>Download Tuff Client 1.12.2</a>
            
            <!-- Normal WASM Option -->
            <a href="" class="btn-secondary" download>Download Normal WASM 1.12.2</a>
        </div>
    </div>

</body>
</html>
