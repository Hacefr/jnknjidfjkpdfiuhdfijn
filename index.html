<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        /* GitHub Dark Mode Theme */
        body {
            background-color: #0d1117; /* GitHub dark background */
            color: #c9d1d9; /* Standard text color */

            display: flex;

        }
