<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eaglercraft 1.12.2</title>
    <style>
        /* GitHub Dark Mode Theme */
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            background-color: #161b22;
            padding: 40px;
            border-radius: 6px;
            border: 1px solid #30363d;
            max-width: 450px;
            width: 100%;
        }

        h1 { font-size: 24px; margin-bottom: 8px; color: #f0f6fc; }
        
        .disclaimer {
            background-color: rgba(56, 139, 253, 0.1);
            border: 1px solid rgba(56, 139, 253, 0.4);
            color: #58a6ff;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        p { font-size: 14px; color: #8b949e; margin-bottom: 30px; }

        .section {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid;
            width: 80%;
            text-align: center;
        }

        /* Completed Button Styles */
        .btn-primary { 
            background-color: #238636; 
            color: #ffffff; 
            border-color: rgba(240, 246, 252, 0.1);
        }

        .btn-primary:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Eaglercraft 1.12.2</h1>
        <div class="disclaimer">
            This version is highly experimental. Performance may vary.
        </div>
        <p>Click the button below to launch the web client.</p>

        <div class="section">

            <button class="btn btn-primary" onclick="trollRedirect()">Launch Game</button>
        </div>
    </div>

    <script>
        function trollRedirect() {

            window.location.href = "https://hacefr.github.io/ncdnhjdcjhndfjhdfjhhnj/";
        }
    </script>

</body>
</html>
