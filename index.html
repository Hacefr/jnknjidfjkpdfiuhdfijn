<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eaglercraft 1.12.2 Downloads</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background-color: #161b22;
            padding: 40px;
            border-radius: 6px;
            border: 1px solid #30363d;
            max-width: 450px;
            width: 100%;
        }

        h1 { font-size: 24px; margin-bottom: 8px; color: #f0f6fc; }
        p { font-size: 14px; color: #8b949e; margin-bottom: 30px; }

        .section {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* GitHub Buttons */
        .btn {
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid;
        }

        .btn-primary { background-color: #238636; color: #fff; border-color: rgba(240,246,252,0.1); }
        .btn-primary:hover { background-color: #2ea043; }

        .btn-secondary { background-color: #21262d; color: #c9d1d9; border-color: #30363d; }
        .btn-secondary:hover { background-color: #30363d; border-color: #8b949e; }

        .btn-cloak {
            background: none;
            border: none;
            color: #58a6ff;
            font-size: 12px;
            text-decoration: underline;
            padding: 0;
            margin-top: 4px;
        }
        .btn-cloak:hover { color: #79c0ff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Eaglercraft 1.12.2</h1>
        <p>Select a version to download or play.</p>
        
        <!-- Tuff Client Section -->
        <div class="section">
            <a href="" class="btn btn-primary" download>Download Tuff Client</a>
            <button class="btn-cloak" onclick="openCloaked('')">Open Tuff Client (about:blank)</button>
        </div>
        
        <!-- Normal WASM Section -->
        <div class="section">
            <a href="" class="btn btn-secondary" download>Download Normal WASM</a>
            <button class="btn-cloak" onclick="openCloaked('')">Open Normal WASM (about:blank)</button>
        </div>
    </div>

    <script>
        function openCloaked(url) {
            if (!url) {
                alert("Please add the file URL in the code first!");
                return;
            }
            var win = window.open();
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.margin = '0';
            iframe.src = url;
            win.document.body.appendChild(iframe);
        }
    </script>

</body>
</html>
